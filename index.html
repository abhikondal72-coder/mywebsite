<!DOCTYPE html>
<html>
<head>
  <title>Student Portal</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      text-align: center;
      overflow: hidden;
    }

    .container {
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 20px;
      background: linear-gradient(to right, #ffcc00, #ffffff);
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      font-size: 20px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 15px 40px;
      font-size: 20px;
      border: none;
      border-radius: 30px;
      background: #ffcc00;
      color: black;
      cursor: pointer;
      transition: 0.4s;
    }

    .btn:hover {
      background: white;
      transform: scale(1.1);
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(-30px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Welcome to Student Registration Portal</h1>
    <p>Click below to register your details</p>
    <button class="btn" onclick="window.location.href='register.html'">
      Register Now
    </button>
  </div>
</body>
</html>

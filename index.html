<!DOCTYPE html>
<html>
<head>
<title>Student Registration Portal</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  overflow-x:hidden;
}

/* HOME SECTION */
#home{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

#home h1{
  font-size:50px;
  background:linear-gradient(to right,#ffcc00,#ffffff);
  -webkit-background-clip:text;
  color:transparent;
}

.btn{
  padding:15px 40px;
  font-size:20px;
  border:none;
  border-radius:30px;
  background:#ffcc00;
  cursor:pointer;
  transition:0.4s;
}

.btn:hover{
  transform:scale(1.1);
  background:white;
}

/* FORM SECTION */
#register{
  display:none;
  padding:40px 0;
  background:linear-gradient(120deg,#ff6a00,#ee0979);
}

.form-container{
  width:450px;
  background:white;
  padding:30px;
  margin:auto;
  border-radius:15px;
  box-shadow:0 15px 35px rgba(0,0,0,0.4);
  animation:slideUp 1s ease;
}

@keyframes slideUp{
  from{transform:translateY(50px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.form-container h2{
  text-align:center;
  color:#ee0979;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

button.submit{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:linear-gradient(to right,#ff6a00,#ee0979);
  color:white;
  font-size:18px;
  cursor:pointer;
}

table{
  width:90%;
  margin:40px auto;
  border-collapse:collapse;
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:12px;
  text-align:center;
}

th{
  background:#ee0979;
  color:white;
}

tr:nth-child(even){
  background:#f2f2f2;
}
</style>
</head>

<body>

<!-- HOME PAGE -->
<div id="home">
  <div>
    <h1>Welcome to Student Registration Portal</h1>
    <br>
    <button class="btn" onclick="showRegister()">Register Now</button>
  </div>
</div>

<!-- REGISTER PAGE -->
<div id="register">
  <div class="form-container">
    <h2>Student Registration</h2>
    <form id="myForm">
      <input type="text" placeholder="Full Name" id="name" required>
      <input type="text" placeholder="Father Name" id="father" required>
      <input type="text" placeholder="Mother Name" id="mother" required>

      <select id="qualification" required>
        <option value="">Select Qualification</option>
        <option>10th</option>
        <option>12th</option>
        <option>Undergraduate</option>
        <option>Graduate</option>
      </select>

      <input type="text" placeholder="Mobile Number" id="mobile" required>
      <button type="submit" class="submit">Submit</button>
    </form>
  </div>

  <table id="dataTable">
    <tr>
      <th>Name</th>
      <th>Father</th>
      <th>Mother</th>
      <th>Qualification</th>
      <th>Mobile</th>
    </tr>
  </table>
</div>

<script>
function showRegister(){
  document.getElementById("home").style.display="none";
  document.getElementById("register").style.display="block";
}

document.getElementById("myForm").addEventListener("submit",function(e){
  e.preventDefault();

  let table=document.getElementById("dataTable");
  let row=table.insertRow(-1);

  row.insertCell(0).innerHTML=document.getElementById("name").value;
  row.insertCell(1).innerHTML=document.getElementById("father").value;
  row.insertCell(2).innerHTML=document.getElementById("mother").value;
  row.insertCell(3).innerHTML=document.getElementById("qualification").value;
  row.insertCell(4).innerHTML=document.getElementById("mobile").value;

  document.getElementById("myForm").reset();
});
</script>

</body>
</html>

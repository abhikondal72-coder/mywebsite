<!DOCTYPE html>
<html>
<head>
    <title>Abhi Information Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(-45deg,#1e3c72,#2a5298,#0f2027,#203a43);
            background-size:400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        .container{
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,0.1);
            padding:40px;
            width:380px;
            border-radius:20px;
            box-shadow:0 15px 35px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn{
            from{opacity:0; transform:translateY(20px);}
            to{opacity:1; transform:translateY(0);}
        }

        h2{
            text-align:center;
            margin-bottom:25px;
            font-weight:700;
            font-size:26px;
            background: linear-gradient(90deg,#00f2fe,#4facfe);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:10px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            transform:scale(1.05);
            box-shadow:0 0 10px #4facfe;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background: linear-gradient(90deg,#00f2fe,#4facfe);
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.4s;
        }

        button:hover{
            transform:scale(1.05);
            box-shadow:0 0 15px #4facfe;
        }

        button:disabled{
            background:grey;
        }

        .success{
            text-align:center;
            margin-top:15px;
            color:#00ffcc;
            font-weight:500;
            animation: pop 0.5s ease;
        }

        @keyframes pop{
            from{transform:scale(0.8); opacity:0;}
            to{transform:scale(1); opacity:1;}
        }
    </style>
</head>

<body>

<div class="container">
    <h2>✨ Abhi Information Form ✨</h2>

    <form id="myForm">
        <input type="text" placeholder="Name" required>
        <input type="text" id="mobile" placeholder="Mobile No" required>
        <input type="text" placeholder="Father Name">
        <input type="text" placeholder="Mother Name">
        <input type="email" placeholder="Email" required>
        <input type="text" placeholder="Qualification">
        <button type="submit">Submit</button>
        <div class="success" id="message"></div>
    </form>
</div>

<script>
document.getElementById("myForm").addEventListener("submit", function(event) {
    event.preventDefault();

    var submitBtn = document.querySelector("button");
    submitBtn.disabled = true;

    var mobile = document.getElementById("mobile").value;

    if (mobile.length !== 10 || isNaN(mobile)) {
        alert("Mobile number must be 10 digits!");
        submitBtn.disabled = false;
        return;
    }

    var formData = {
        name: document.querySelectorAll("input")[0].value,
        mobile: mobile,
        father: document.querySelectorAll("input")[2].value,
        mother: document.querySelectorAll("input")[3].value,
        email: document.querySelectorAll("input")[4].value,
        qualification: document.querySelectorAll("input")[5].value
    };

    fetch("https://script.google.com/macros/s/AKfycbyskfIgUlrx7nfwCJ1B8UZNa1AGt59tPAEK14wK5l3q7xWmw1GWXxk6JJzYHYs90USv/exec", {
        method: "POST",
        body: JSON.stringify(formData)
    })
    .then(response => response.text())
    .then(data => {
        document.getElementById("message").innerText = "✔ Data Saved Successfully!";
        document.getElementById("myForm").reset();
        submitBtn.disabled = false;
    })
    .catch(error => {
        alert("Error saving data");
        submitBtn.disabled = false;
    });
});
</script>

</body>
</html>

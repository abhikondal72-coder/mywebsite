<!DOCTYPE html>
<html>
<head>
    <title>Abhi Tech Solutions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            background:#f4f7fc;
        }

        /* NAVBAR */
        nav{
            background:white;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 10%;
            box-shadow:0 5px 15px rgba(0,0,0,0.05);
        }

        nav h1{
            color:#2a5298;
            font-size:22px;
        }

        nav ul{
            list-style:none;
            display:flex;
            gap:25px;
        }

        nav ul li{
            cursor:pointer;
            font-weight:500;
        }

        nav ul li:hover{
            color:#2a5298;
        }

        /* HERO SECTION */
        .hero{
            padding:80px 10%;
        }

        .hero-text{
            max-width:600px;
        }

        .hero-text h2{
            font-size:40px;
            margin-bottom:20px;
            color:#1e3c72;
        }

        .hero-text p{
            color:#555;
            margin-bottom:30px;
        }

        .hero-text button{
            padding:12px 25px;
            border:none;
            background:#2a5298;
            color:white;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
        }

        .hero-text button:hover{
            background:#1e3c72;
        }

        /* FORM SECTION */
        .form-section{
            padding:60px 10%;
            background:white;
        }

        .form-container{
            max-width:450px;
            margin:auto;
            padding:40px;
            border-radius:10px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .form-container h3{
            text-align:center;
            margin-bottom:25px;
            color:#2a5298;
        }

        input, select{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ddd;
            border-radius:6px;
        }

        button.submit-btn{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            background:#2a5298;
            color:white;
            border-radius:6px;
            cursor:pointer;
            transition:0.3s;
        }

        button.submit-btn:hover{
            background:#1e3c72;
        }

        button.submit-btn:disabled{
            background:grey;
        }

        .success{
            text-align:center;
            margin-top:15px;
            color:green;
        }

        /* FOOTER */
        footer{
            text-align:center;
            padding:20px;
            background:#1e3c72;
            color:white;
            margin-top:40px;
        }
    </style>
</head>

<body>

<nav>
    <h1>Abhi Tech</h1>
    <ul>
        <li>Home</li>
        <li>Services</li>
        <li>Contact</li>
    </ul>
</nav>

<section class="hero">
    <div class="hero-text">
        <h2>Welcome to Abhi Tech Solutions</h2>
        <p>We build modern websites and smart digital solutions for the future.</p>
        <button onclick="document.querySelector('.form-section').scrollIntoView({behavior:'smooth'})">
            Get Started
        </button>
    </div>
</section>

<section class="form-section">
    <div class="form-container">
        <h3>Register Now</h3>

        <form id="myForm">
            <input type="text" placeholder="Name" required>
            <input type="text" id="mobile" placeholder="Mobile No" required>
            <input type="text" placeholder="Father Name">
            <input type="text" placeholder="Mother Name">
            <input type="email" placeholder="Email" required>

            <select id="qualification" required>
                <option value="">Select Qualification</option>
                <option>10th</option>
                <option>12th</option>
                <option>Undergraduate</option>
                <option>Graduate</option>
            </select>

            <button type="submit" class="submit-btn">Submit</button>
            <div class="success" id="message"></div>
        </form>
    </div>
</section>

<footer>
    © 2026 Abhi Tech Solutions | All Rights Reserved
</footer>

<script>
document.getElementById("myForm").addEventListener("submit", function(event) {
    event.preventDefault();

    var submitBtn = document.querySelector(".submit-btn");
    submitBtn.disabled = true;

    var mobile = document.getElementById("mobile").value;

    if (mobile.length !== 10 || isNaN(mobile)) {
        alert("Mobile number must be 10 digits!");
        submitBtn.disabled = false;
        return;
    }

    var formData = {
        name: document.querySelectorAll("input")[0].value,
        mobile: mobile,
        father: document.querySelectorAll("input")[2].value,
        mother: document.querySelectorAll("input")[3].value,
        email: document.querySelectorAll("input")[4].value,
        qualification: document.getElementById("qualification").value
    };

    fetch("https://script.google.com/macros/s/AKfycbyskfIgUlrx7nfwCJ1B8UZNa1AGt59tPAEK14wK5l3q7xWmw1GWXxk6JJzYHYs90USv/exec", {
        method: "POST",
        body: JSON.stringify(formData)
    })
    .then(response => response.text())
    .then(data => {
        document.getElementById("message").innerText = "✔ Registration Successful!";
        document.getElementById("myForm").reset();
        submitBtn.disabled = false;
    })
    .catch(error => {
        alert("Error saving data");
        submitBtn.disabled = false;
    });
});
</script>

</body>
</html>
